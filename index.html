  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --white: #f5f0ea;
      --black: #0a0a0a;
      --accent: #c9b99a;
      --neon: #E8FF00;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Montserrat', sans-serif;
      font-weight: 200;
      overflow-x: hidden;
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-video-wrap {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .hero-video-wrap iframe {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 177.78vh;
      height: 100vh;
      min-width: 100%;
      min-height: 56.25vw;
      transform: translate(-50%, -50%);
      pointer-events: none;
      border: none;
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(10,10,10,0.1) 0%,
        rgba(10,10,10,0.0) 40%,
        rgba(10,10,10,0.65) 100%
      );
      z-index: 1;
    }

    /* Scroll hint pinned to bottom */
    .scroll-hint-wrap {
      position: absolute;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      opacity: 0;
      animation: fadeUp 1s ease 1.5s forwards;
    }

    .scroll-hint {
      font-family: 'Archivo Black', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.55em;
      text-transform: uppercase;
      color: var(--white);
      opacity: 0.45;
    }

    @keyframes fadeUp {
      0%   { opacity: 0; transform: translateX(-50%) translateY(8px); }
      100% { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* ── SINGLE SECTION ── */
    section {
      padding: 6rem 2rem;
      max-width: 900px;
      margin: 0 auto;
      text-align: center;
    }

    .section-label {
      font-family: 'Archivo Black', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.6em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 3rem;
    }

    /* ── SINGLE CARD ── */
    .single-card {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      text-decoration: none;
      color: var(--white);
      transition: transform 0.4s ease;
    }

    .single-card:hover { transform: translateY(-6px); }

    .single-card img {
      width: clamp(200px, 36vw, 320px);
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
      filter: grayscale(10%);
      transition: filter 0.4s ease;
    }

    .single-card:hover img { filter: grayscale(0%); }

    .single-title {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(2rem, 6vw, 3.8rem);
      letter-spacing: 0.2em;
      transition: color 0.3s ease;
      text-transform: uppercase;
    }

    .single-card:hover .single-title {
      color: var(--neon);
    }

    /* ── DIVIDER ── */
    .divider {
      width: 1px;
      height: 60px;
      background: var(--accent);
      margin: 0 auto;
      opacity: 0.3;
    }

    /* ── SOCIALS ── */
    .socials-section {
      padding: 4rem 2rem 5rem;
      text-align: center;
    }

    .socials-label {
      font-family: 'Archivo Black', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 2.5rem;
    }

    .social-icons {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 2rem;
      flex-wrap: wrap;
    }

    .social-icons a {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      opacity: 0.45;
      transition: opacity 0.3s ease, transform 0.3s ease, color 0.3s ease;
      text-decoration: none;
    }

    .social-icons a:hover {
      opacity: 1;
      color: var(--neon);
      transform: translateY(-3px);
    }

    .social-icons svg {
      width: 17px;
      height: 17px;
      fill: currentColor;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 3rem 2rem 2rem;
      border-top: 1px solid rgba(201,185,154,0.1);
    }

    footer img {
      display: block;
      margin: 0 auto 1.4rem;
      width: 65px;
      filter: brightness(0) invert(1);
      opacity: 0.2;
    }

    footer p {
      font-family: 'Archivo Black', sans-serif;
      font-size: 0.5rem;
      letter-spacing: 0.3em;
      color: var(--accent);
      opacity: 0.4;
      text-transform: uppercase;
    }
  </style>
